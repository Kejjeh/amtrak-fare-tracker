name: Validate fare CSV

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/validate-csv.yml"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate CSV schema
        run: python3 scripts/validate_csv.py data/amtrak_fare_log.csv
